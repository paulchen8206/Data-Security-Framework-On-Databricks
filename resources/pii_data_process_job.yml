resources:
  jobs:
    pii_data_process_job.yml:
      name: pii_data_process_job-${bundle.target}
      max_concurrent_runs: 1
      tags:
        project: pii_data_process
        managed_by: databricks-bundle
        target: ${bundle.target}
      tasks:
      - task_key: run_demo_notebook
        existing_cluster_id: ${var.cluster_id}
        notebook_task:
          notebook_path: '../code/python/pii_data_process.py'
          base_parameters:
            secret_scope: ${var.secret_scope}
            kek_name: ${var.kek_name}
            keyvault_user: ${var.keyvault_user}
            data_catalog: ${var.data_catalog}
            data_schema: ${var.data_schema}
            data_volume: ${var.data_volume}
            key_catalog: ${var.key_catalog}
            key_schema: ${var.key_schema}